name: nightly

# Nightly CI tier (plan Milestone 2): full-family validation across seeds and
# difficulties, including real Docker runtime validation for the containerised
# families. GitHub-hosted ubuntu runners provide Docker; the network/scada
# families that need multiple services still build and run there, but a
# self-hosted runner with rootless Docker is the intended production target
# (see docs/security/runtime-isolation.md).

on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-all-families:
    name: generate + static-validate every family
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Generate + static validate all families x difficulties
        run: |
          set -euo pipefail
          run() { PYTHONPATH=src python -c "from ctf_generator.cli import main; main()" "$@"; }
          fams=$(run list-families)
          for fam in $fams; do
            for diff in easy medium hard; do
              out="/tmp/nightly/$fam-$diff"
              run create --output "$out" --seed "nightly-$fam-$diff" --family "$fam" --difficulty "$diff" --force
              run validate "$out"
            done
          done

  runtime-http-families:
    name: docker runtime validation (http families)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Build / launch / health / solve / teardown
        run: |
          set -euo pipefail
          run() { PYTHONPATH=src python -c "from ctf_generator.cli import main; main()" "$@"; }
          # HTTP service families validated end-to-end on real Docker.
          for fam in crypto_token_forgery cloud_metadata_ssrf network_lateral_pivot web_business_logic_tenant_export; do
            out="/tmp/rt/$fam"
            run create --output "$out" --seed "rt-$fam" --family "$fam" --force
            run validate-runtime "$out"
          done

  full-suite:
    name: full unit suite (py3.11 + py3.12)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: |
          mods=$(ls tests/test_*.py | sed 's#tests/##;s#\.py##')
          PYTHONPATH=src:tests python -m unittest $mods

  db-integration:
    name: postgres integration (M6 persistence)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,db]"
      - name: SQLAlchemy engine/session + Alembic up/down against real Postgres
        env:
          CTFGEN_TEST_DATABASE_URL: postgresql+psycopg://postgres:pw@localhost:5432/postgres
        # Tripwire: this job exists to RUN the PG suite, so an all-skip pass
        # (missing extra, bad DB URL, gating bug) must FAIL, not go green.
        run: |
          set -o pipefail
          PYTHONPATH=src:tests python -m unittest test_database_integration -v 2>&1 | tee /tmp/db-tests.log
          if ! grep -qE '^(ok|OK)$|\.\.\. ok' /tmp/db-tests.log; then
            echo "::error::PG integration suite ran 0 tests (everything skipped)"; exit 1
          fi
