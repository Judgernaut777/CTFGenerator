name: release

# Release CI tier (plan Milestone 2): runs the full suite, builds signed,
# checksummed artifacts with an SBOM, and attaches them to the GitHub release.
# The project is proprietary/for-profit -- this workflow does NOT publish to
# PyPI. Distribution is via the attached release artifacts only.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create releases / upload assets

jobs:
  full-suite:
    name: full unit suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: |
          mods=$(ls tests/test_*.py | sed 's#tests/##;s#\.py##')
          PYTHONPATH=src:tests python -m unittest $mods

  changelog-gate:
    name: changelog updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CHANGELOG must mention this version
        run: |
          ver="${GITHUB_REF_NAME#v}"
          grep -q "$ver" CHANGELOG.md || {
            echo "CHANGELOG.md has no entry for $ver"; exit 1; }

  artifacts:
    name: build, checksum, SBOM
    needs: [full-suite, changelog-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Metadata check
        run: twine check dist/*
      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o dist/sbom.cdx.json || echo "SBOM generation skipped"
      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/sbom.cdx.json
