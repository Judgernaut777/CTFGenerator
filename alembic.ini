# Alembic configuration for the M6 control-plane database.
# The database URL is NOT stored here -- env.py reads it from CTFGEN_DATABASE_URL
# (see infrastructure/database/config.py) so credentials never live in a
# committed config file.
[alembic]
script_location = alembic
prepend_sys_path = src
# Use a date-ordered, slug filename for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
