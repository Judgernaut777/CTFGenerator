# CTFGenerator control-plane API — OpenAPI (SUPERSEDED POINTER)
#
# STATUS: DEPRECATED / SUPERSEDED. Do NOT use this file as an API contract.
#
# This document was the pre-implementation design draft (version 0.0.0-draft).
# It covered only ~8 of the resource families and its paths, schemas, and
# parameters no longer match the shipped API. The stale content has been
# removed to prevent drift and accidental use.
#
# SOURCE OF TRUTH
#   The API is implemented. The authoritative, always-current OpenAPI 3.1
#   document is generated from the live route handlers and served by the
#   running server at:
#
#       GET /api/v1/openapi.json      (machine-readable contract)
#       GET /api/v1/docs              (Swagger UI)
#       GET /api/v1/redoc             (ReDoc)
#
# HOW TO FETCH / GENERATE
#   From a running server:
#       curl -s http://localhost:8000/api/v1/openapi.json
#
#   Without a running server (requires the [api] extra):
#       PYTHONPATH=src:tests .venv/bin/python3 -c \
#         "import json; from ctf_generator.interfaces.api.app import app; \
#          print(json.dumps(app.openapi()))"
#
# See docs/api/endpoints.md for the index of resource families and how-to,
# and docs/api/slice-a-limitations.md for deferred/resolved items.
