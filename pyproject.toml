[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ctf-generator"
dynamic = ["version"]
description = "AI-assisted CTF environment generator and validator."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "CTFGenerator contributors" }]
license = { file = "LICENSE" }
dependencies = []
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Operating System :: OS Independent",
    "Topic :: Security",
    "Environment :: Console",
    "License :: Other/Proprietary License",
]

[project.optional-dependencies]
dev = ["pytest>=8"]
# LLM-backed spec generation (`ctfgen spec --backend llm`). Optional so the core
# tool stays dependency-free.
llm = ["anthropic>=0.49"]

[project.scripts]
ctfgen = "ctf_generator.cli:main"

[project.urls]
Homepage = "https://github.com/Judgernaut777/CTFGenerator"
Repository = "https://github.com/Judgernaut777/CTFGenerator"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = { attr = "ctf_generator.__version__" }
