{% extends "base.html" %}
{% block title %}Sign in - CTFGenerator{% endblock %}
{% block content %}
<div class="card card-narrow">
  <h1>Sign in</h1>
  {% if error %}<div class="error-banner">{{ error }}</div>{% endif %}
  <form method="post" action="{{ mount_path }}/login">
    <p>
      <label for="email">Email</label><br>
      <input id="email" name="email" type="email" autocomplete="username"
             class="field-full" required>
    </p>
    <p>
      <label for="password">Password</label><br>
      <input id="password" name="password" type="password"
             autocomplete="current-password" class="field-full" required>
    </p>
    <button type="submit" class="btn">Sign in</button>
  </form>
</div>
{% endblock %}
