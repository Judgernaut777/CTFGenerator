{% extends "base.html" %}
{% block title %}Sign in - CTFGenerator{% endblock %}
{% block content %}
<div class="card" style="max-width: 380px; margin: 3rem auto;">
  <h1>Sign in</h1>
  {% if error %}<div class="error-banner">{{ error }}</div>{% endif %}
  <form method="post" action="{{ mount_path }}/login">
    <p>
      <label for="email">Email</label><br>
      <input id="email" name="email" type="email" autocomplete="username"
             style="width:100%; padding:0.5rem;" required>
    </p>
    <p>
      <label for="password">Password</label><br>
      <input id="password" name="password" type="password"
             autocomplete="current-password" style="width:100%; padding:0.5rem;" required>
    </p>
    <button type="submit" style="padding:0.55rem 1rem;">Sign in</button>
  </form>
</div>
{% endblock %}
